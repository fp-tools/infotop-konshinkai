<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>懇親会管理システム | インフォトップ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="css/style.css?v=20260703d">
<style>
#loginMask{position:fixed;inset:0;background:#10182a;z-index:1000;display:none;align-items:center;justify-content:center}
#loginBox{background:#fff;border-radius:14px;padding:34px 36px;width:360px;max-width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.35)}
#loginBox h2{margin:0 0 4px;font-size:18px}
#loginBox .sub{color:#6b7686;font-size:12px;margin-bottom:20px}
</style>
</head>
<body>
<div id="loginMask">
  <div id="loginBox">
    <h2>懇親会管理システム</h2>
    <div class="sub">社内用の管理画面です。IDとパスワードでログインしてください。</div>
    <div id="loginMsg"></div>
    <label class="fld"><span>ID</span><input id="lg_user" autocomplete="username"></label>
    <label class="fld"><span>パスワード</span><input id="lg_pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></label>
    <button id="lg_btn" class="btn primary" style="width:100%;padding:11px" onclick="doLogin()">ログイン</button>
  </div>
</div>
<div class="app">
  <aside class="side">
    <div class="logo">懇親会管理<small>インフォトップ</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot" id="storeInfo"></div>
  </aside>
  <main class="main">
    <header class="top">
      <h1 id="pageTitle">ダッシュボード</h1>
      <span class="crumb" id="crumb"></span>
      <span class="sp"></span>
      <div id="topActions" class="flex"></div>
    </header>
    <div class="content" id="view"></div>
  </main>
</div>
<div id="modalRoot"></div>

<script src="js/app.js?v=20260703d"></script>
</body>
</html>
