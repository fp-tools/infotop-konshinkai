# recend-mailer（メール送信・予約配信・開封計測・QR生成・領収書claim API）のデプロイ設定
# デプロイ: cd workers && npx wrangler deploy
name = "recend-mailer"
main = "recend-worker.js"
compatibility_date = "2026-07-01"
account_id = "d9efe74340086b0eb0ff36f97773fe07"

# ダッシュボードで設定済みの環境変数を消さない
keep_vars = true

[vars]
# 本番運用: 実際の宛先に送信する（テスト配信に戻す場合は "true" にして再デプロイ）
TEST_MODE = "false"

kv_namespaces = [
  { binding = "MAILLOG", id = "dfdc1ac55037420ca195fe2dd9953dd3" }
]

# 予約配信の実行（5分おき）
[triggers]
crons = ["*/5 * * * *"]
